name: Club Noel DMI - CI Pipeline

# Trigger the pipeline on pushes or pull requests to main/develop branches
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # 1. Backend Integration Tests
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -r pyproject.toml

      - name: Run Pytest
        run: pytest -v

  # 2. Frontend Integration Tests (Vitest)
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

  # 3. Docker Image Build Verification
  docker-build:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t clubnoel-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t clubnoel-frontend ./frontend
